<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&amp;family=Nunito+Sans:opsz,wght@6..12,400..800&amp;display=swap"
			rel="stylesheet"
		/>
		<script>
			try {
				const theme = localStorage.getItem('5-minute-grove:theme');
				const themes = [
					'soft-daylight',
					'cozy-light',
					'cozy-dark',
					'quiet-night',
					'gruvbox-light',
					'gruvbox-dark'
				];
				document.documentElement.dataset.theme = themes.includes(theme) ? theme : 'soft-daylight';
			} catch {
				document.documentElement.dataset.theme = 'soft-daylight';
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
